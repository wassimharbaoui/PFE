<!DOCTYPE html>
<html>
<head>
    <title>Data Quality Platform - Connexion</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        
        /* Éléments décoratifs animés */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 20s infinite;
        }
        
        .circle1 {
            width: 300px;
            height: 300px;
            top: -150px;
            left: -150px;
            animation-delay: 0s;
        }
        
        .circle2 {
            width: 200px;
            height: 200px;
            bottom: -100px;
            right: -100px;
            animation-delay: 5s;
        }
        
        .circle3 {
            width: 150px;
            height: 150px;
            bottom: 50px;
            left: 50px;
            animation-delay: 10s;
        }
        
        .circle4 {
            width: 250px;
            height: 250px;
            top: 50px;
            right: 50px;
            animation-delay: 15s;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-50px) rotate(180deg);
            }
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 50px;
            width: 450px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            animation: slideDown 0.8s ease;
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo i {
            font-size: 4rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }
        
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2rem;
            font-weight: 700;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        
        .subtitle i {
            color: #667eea;
            margin: 0 5px;
        }
        
        .message {
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            animation: slideDown 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
        }
        
        .message.error {
            background: #fee;
            color: #e74c3c;
            border: 1px solid #fcc;
            border-left: 5px solid #e74c3c;
        }
        
        .message i {
            font-size: 1.3rem;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        label i {
            color: #667eea;
            margin-right: 8px;
            width: 20px;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e9ecef;
            border-radius: 15px;
            font-size: 1rem;
            transition: all 0.3s;
            background: white;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.2);
            transform: translateY(-2px);
        }
        
        input:hover {
            border-color: #764ba2;
        }
        
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }
        
        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        
        button:hover::before {
            left: 100%;
        }
        
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        button i {
            font-size: 1.2rem;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #999;
            font-size: 0.85rem;
        }
        
        .footer i {
            color: #667eea;
            animation: pulse 2s infinite;
        }
        
        /* Petite animation pour le message d'erreur */
        @keyframes shake {
            0%, 100% {
                transform: translateX(0);
            }
            10%, 30%, 50%, 70%, 90% {
                transform: translateX(-5px);
            }
            20%, 40%, 60%, 80% {
                transform: translateX(5px);
            }
        }
        
        .message.error {
            animation: shake 0.5s ease, slideDown 0.3s ease;
        }
    </style>
    <!-- Font Awesome pour les icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Éléments décoratifs animés -->
    <div class="circle circle1"></div>
    <div class="circle circle2"></div>
    <div class="circle circle3"></div>
    <div class="circle circle4"></div>
    
    <div class="login-container">
        <div class="logo">
            <i class="fas fa-chart-line"></i>
        </div>
        
        <h2>Data Quality Platform</h2>
        <div class="subtitle">
            <i class="fas fa-shield-alt"></i>
            Plateforme de qualité des données
            <i class="fas fa-database"></i>
        </div>
        
        <!-- Affichage des messages d'erreur -->
        {% if messages %}
            {% for message in messages %}
                <div class="message error">
                    <i class="fas fa-exclamation-circle"></i>
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>
                    <i class="fas fa-user"></i>
                    Nom d'utilisateur
                </label>
                <div class="input-wrapper">
                    <input type="text" name="username" placeholder="Entrez votre nom d'utilisateur" required 
                           value="{{ request.POST.username }}">
                </div>
            </div>
            
            <div class="form-group">
                <label>
                    <i class="fas fa-lock"></i>
                    Mot de passe
                </label>
                <div class="input-wrapper">
                    <input type="password" name="password" placeholder="Entrez votre mot de passe" required>
                </div>
            </div>
            
            <button type="submit">
                <i class="fas fa-sign-in-alt"></i>
                Se connecter
            </button>
        </form>
        
        <div class="footer">
            <i class="fas fa-copyright"></i>
            Data Quality Platform - Contrôle qualité SQL Server
        </div>
    </div>
</body>
</html>
